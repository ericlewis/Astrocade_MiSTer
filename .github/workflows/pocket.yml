name: Build Astrocade Pocket Core

on:
  push:
    branches: [master, pocket]
    paths: ['pocket/**', 'rtl/**', 'pkg/**', '.github/workflows/pocket.yml']
  pull_request:
    branches: [master]
    paths: ['pocket/**', 'rtl/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build
        run: ln -sf ../rtl pocket/rtl

      - name: Compile with Quartus
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build/pocket \
            raetro/quartus:pocket \
            quartus_sh --flow compile Astrocade_Pocket

      - name: Reverse bitstream
        run: |
          sudo chown -R runner:runner pocket/output_files/
          python3 pocket/reverse_bitstream.py \
            pocket/output_files/Astrocade_Pocket.rbf \
            pocket/output_files/bitstream.rbf_r

      - name: Package
        run: |
          mkdir -p release/Cores/ericlewis.Astrocade release/Platforms
          cp pocket/output_files/bitstream.rbf_r release/Cores/ericlewis.Astrocade/
          cp pkg/Cores/ericlewis.Astrocade/*.json release/Cores/ericlewis.Astrocade/
          cp pkg/Platforms/astrocade.json release/Platforms/

      - uses: actions/upload-artifact@v4
        with:
          name: ericlewis.Astrocade-pocket
          path: release/
          retention-days: 30
